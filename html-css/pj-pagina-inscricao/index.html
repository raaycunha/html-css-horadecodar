<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Increva-se na Nossa Newsletter</title>
    <link rel="shortcut icon" href="src/assets/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="src/styles/style.css">
    <link rel="stylesheet" href="src/styles/media.css" media="screen">
</head>
<body>
    <header class="header-container">
        <div class="container">
            <section class="title-logo">
                <img src="src/assets/logo.png" alt="Logo-DevStore">
                <h2>DevStore</h2>
            </section>
            <nav class="navbar">
                <ul class="list-menu">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Serviços</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Contato</a></li>
                    <li><a href="#">FAQ</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="main-container">
        <div class="container">
            <section class="content-container">
                <form id="frm" method="get">
                    <h1>Inscreva-se Agora na Nossa <span class="strong">Newsletter</span></h1>
                    <p>
                        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Optio quos nam perferendis, eveniet sunt vero 
                        culpa minima incidunt distinctio dolorum eligendi animi?
                    </p>
                    <div class="box-input">
                        <input type="text"
                        name="nameUser"
                        id="inNameUser"
                        placeholder="Digite seu nome.."
                        title="Digite o seu nome"
                        minlength="3"
                        required maxlength="25">
                    </div>
                    <div class="box-input">
                        <input type="email"
                        name="emailUser"
                        id="inEmailUser"
                        placeholder="Digite seu e-mail.."
                        title="Digite o seu email"
                        required>
                    </div>
                    <button id="btnSubmit" type="submit">Enviar</button>
                </form>
            </section>
            <section class="banner-container">
                <img src="src/assets/banner.jpg" alt="Foto-Tecnologia">
                <div class="circle-orange">.</div>
            </section>
        </div>
    </main>
</body>
</html>
